<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
</head>
<body>
    <h2>Movie Recommendation System</h2>
    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name" required>
        <button type="submit">Recommend</button>
    </form>

    {% if movie_name %}
        <h3>Recommendations for "{{ movie_name }}":</h3>
        {% if recommendations %}
            <ul>
                {% for movie in recommendations %}
                    <li>{{ movie }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No recommendations found. Check spelling.</p>
        {% endif %}
    {% endif %}
</body>
</html>
